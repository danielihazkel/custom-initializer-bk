h2:
  datasource:
    url: ${H2_DB_URL:jdbc:h2:mem:appdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false}
    username: ${H2_DB_USERNAME:sa}
    password: ${H2_DB_PASSWORD:}
    driver-class-name: org.h2.Driver
  hibernate:
    dialect: org.hibernate.dialect.H2Dialect
    hbm2ddl-auto: create-drop
spring:
  h2:
    console:
      enabled: true
      path: /h2-console
