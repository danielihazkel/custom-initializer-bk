server:
  port: 8080

admin:
  password: changeme

# springdoc-openapi: keep the OpenAPI spec focused on the agent contract.
# The browser-facing wizard controllers introspect spec/wsdl objects whose
# transitive deps drag in legacy javax.xml.bind types — including them in the
# scan blows up /v3/api-docs at runtime.
springdoc:
  packages-to-scan: com.menora.initializr.agent
  paths-to-match: /agent/**
  swagger-ui:
    path: /swagger-ui.html

spring:
  cache:
    type: jcache
  datasource:
    url: jdbc:h2:file:./data/initializr
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    baseline-on-migrate: true
    baseline-version: 1
  h2:
    console:
      enabled: true
      path: /h2-console

initializr:
  group-id:
    value: com.menora
  artifact-id:
    value: demo
  version:
    value: 0.0.1-SNAPSHOT
  name:
    value: demo
  description:
    value: Menora Spring Boot project
  package-name:
    value: com.menora.demo
  java-versions:
    - id: 21
      default: true
    - id: 17
  languages:
    - name: Java
      id: java
      default: true
    - name: Kotlin
      id: kotlin
  boot-versions:
    - id: 3.2.1
      name: 3.2.1
      default: true
  configuration-file-formats:
    - name: properties
      id: properties
      default: true
    - name: yaml
      id: yaml
  packagings:
    - name: Jar
      id: jar
      default: true
    - name: War
      id: war
  types:
    - name: Maven Project
      id: maven-project
      description: Generate a Maven-based project archive
      default: true
      action: /starter.zip
      tags:
        build: maven
        format: project
    - name: Gradle Project
      id: gradle-project
      description: Generate a Gradle-based project archive
      action: /starter.zip
      tags:
        build: gradle
        format: project
  env:
    repositories:
      menora-release:
        name: Menora Artifactory Releases
        url: https://repo.menora.co.il/artifactory/libs-release
        releases-enabled: true
        snapshots-enabled: false
      menora-snapshot:
        name: Menora Artifactory Snapshots
        url: https://repo.menora.co.il/artifactory/libs-snapshot
        releases-enabled: false
        snapshots-enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

menora:
  audit:
    log-remote-addr: true

# AI file-contribution feature. Disabled by default — set ai.enabled=true and
# ai.endpoint-url=<your endpoint> to turn it on.
#
#   provider=openai (default) — POSTs an OpenAI-compatible chat/completions
#                               JSON body and reads choices[0].message.content.
#   provider=menora           — POSTs a multipart/form-data body (input,
#                               modelId, labels) and reads the "message" field.
#                               Set menora-app-id to the value assigned by
#                               the platform team (e.g. APM0000001).
ai:
  enabled: false
  provider: openai
  endpoint-url: ""
  auth-header-name: Authorization
  auth-header-value: ""
  model: gpt-4o-mini
  menora-app-id: ""
  timeout-seconds: 60
  max-files: 20
